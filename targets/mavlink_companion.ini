# ********************************
# MAVLink ESP-NOW Companion
# ********************************

[env:MAVLink_Companion_ESP32_via_UART]
extends = env_common_esp32, mavlink_companion_common
build_flags =
	${env_common_esp32.build_flags}
	${mavlink_companion_common.build_flags}

[env:MAVLink_Companion_ESP32C3_via_USB]
extends = env_common_esp32c3, mavlink_companion_common
build_flags =
	${env_common_esp32c3.build_flags}
	${mavlink_companion_common.build_flags}
	-D ARDUINO_USB_CDC_ON_BOOT=1

[env:MAVLink_Companion_ESP32S3_via_USB]
extends = env_common_esp32s3, mavlink_companion_common
build_flags =
	${env_common_esp32s3.build_flags}
	${mavlink_companion_common.build_flags}
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
